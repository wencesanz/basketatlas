<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liga Endesa ACB 2025-26 — Clasificación y Estadísticas de Jugadores | Basket Atlas</title>
<meta name="description" content="Clasificación, líderes estadísticos y ficha de cada jugador de la Liga Endesa (ACB) 2025-26: puntos, rebotes, asistencias y valoración por equipo y jornada.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#181818; --ink:#EFEFE4; --muted:#8A8A85; --line:#222222; --card:#181818; --card-line:rgba(255,255,255,0.1);
    --accent:#81ADEC;
    --fs-micro:11px; --fs-eyebrow:12px; --fs-caption:13px; --fs-body:14px;
    --fs-lead:16px; --fs-stat:24px; --fs-title:30px; --fs-hero:36px;
  }
  html.light{
    --bg:#EFEFE4; --ink:#181818; --muted:#79786F; --line:#D7D7D6; --card:#FCFCF9; --card-line:#D7D7D6;
    --accent:#5D8CD7;
  }
  html{background:var(--bg);}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:'Inter',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;
    transition:background .15s ease, color .15s ease;}
  a{color:inherit;text-decoration:none;}
  .wrap{max-width:1080px;margin:0 auto;padding:0 24px;}
  .mono{font-family:'JetBrains Mono',ui-monospace,monospace;}

  header{display:flex;justify-content:space-between;align-items:center;padding:22px 0;}
  .logo{font-weight:700;font-size:15px;display:flex;align-items:center;}
  .logo svg{height:22px;width:auto;display:block;}
  nav{display:flex;gap:20px;align-items:center;}
  nav>*{margin-right:14px;}
  nav>*:last-child{margin-right:0;}
  nav a{font-size:14px;font-weight:500;color:var(--muted);}
  nav a.active{color:var(--ink);}
  .btn-ghost{
    font-family:inherit;font-size:14px;background:none;color:var(--muted);
    border:1px solid var(--line);border-radius:8px;padding:9px 16px;cursor:pointer;font-weight:500;
  }
  .btn-ghost:hover{color:var(--ink);border-color:var(--muted);}

  .league-hero{background:var(--card);border:1px solid var(--card-line);border-radius:10px;color:#fff;
    padding:28px;position:relative;overflow:hidden;margin-top:28px;}
  html.light .league-hero{
    box-shadow:0 16px 32px -16px rgba(0,0,0,0.12),0 8px 16px -8px rgba(0,0,0,0.08),0 4px 8px -4px rgba(0,0,0,0.04);
  }
  .league-hero .watermark{font-size:150px;font-weight:700;color:#fff;opacity:.06;position:absolute;
    top:-24px;right:0;line-height:1;}
  .league-tag{font-size:var(--fs-caption);letter-spacing:0.04em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:8px;}
  .league-hero h1{font-size:var(--fs-title);font-weight:700;margin:0 0 6px;letter-spacing:-0.015em;}
  .league-hero .sub{font-size:var(--fs-body);color:#B0AD9F;}
  .league-stats{display:flex;gap:32px;margin-top:22px;}
  .league-stats>*{margin-right:32px;}
  .league-stats>*:last-child{margin-right:0;}
  .league-stats .item .label{font-size:var(--fs-micro);color:#8A8980;margin-bottom:3px;}
  .league-stats .item .value{font-size:var(--fs-lead);font-weight:700;color:#fff;}

  .content{padding:36px 0;}
  .section-label{font-size:var(--fs-eyebrow);font-weight:600;color:var(--muted);margin-bottom:16px;}

  .team-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:14px;margin-bottom:24px;}
  .team-strip>*{margin-right:8px;}
  .team-chip{
    font-family:inherit;font-size:var(--fs-caption);font-weight:500;white-space:nowrap;
    padding:8px 16px;border:1px solid var(--line);border-radius:20px;background:none;color:var(--muted);cursor:pointer;
  }
  .team-chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}

  .stat-tabs{display:flex;gap:18px;margin-bottom:20px;}
  .stat-tab{
    font-family:inherit;font-size:var(--fs-caption);font-weight:500;background:none;border:none;
    color:var(--muted);cursor:pointer;padding-bottom:6px;border-bottom:2px solid transparent;
  }
  .stat-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}

  table{width:100%;border-collapse:collapse;font-size:var(--fs-body);}
  thead th{
    text-align:left;font-size:var(--fs-micro);font-weight:500;color:var(--muted);
    padding:0 8px 10px;border-bottom:1px solid var(--line);
  }
  thead th.num-col{text-align:right;}
  tbody td{padding:12px 8px;border-bottom:1px solid var(--line);}
  tbody td.num-col{text-align:right;font-weight:600;}
  tbody tr{border-radius:8px;}
  tbody tr:hover{background:var(--card);cursor:pointer;}
  .rank-col{color:var(--muted);width:26px;}
  .name-cell{display:flex;align-items:center;gap:10px;}
  .dorsal-mini{
    width:28px;height:28px;border-radius:6px;background:var(--card);color:#fff;font-size:var(--fs-eyebrow);font-weight:700;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .player-name{font-weight:600;}
  .team-name{color:var(--muted);font-size:var(--fs-eyebrow);}
  .highlight-col{color:var(--accent);font-weight:700 !important;}

  footer{border-top:1px solid var(--line);padding:20px 0;margin-top:40px;display:flex;
    justify-content:space-between;font-size:var(--fs-caption);color:var(--muted);}

  @media(max-width:720px){
    table{font-size:var(--fs-eyebrow);}
    thead th:nth-child(4), tbody td:nth-child(4),
    thead th:nth-child(6), tbody td:nth-child(6){display:none;}
    .league-stats{gap:18px;flex-wrap:wrap;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo"><svg viewBox="0 0 660 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Basket Atlas"><g fill="none" stroke="currentColor" stroke-width="12" stroke-linecap="round"><circle cx="70" cy="100" r="52"/><path d="M18,100 H122"/><path d="M70,48 A26,52 0 0 1 70,152"/><path d="M70,48 A26,52 0 0 0 70,152"/></g><text x="158" y="126" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="700" font-size="72" letter-spacing="-1" fill="currentColor">Basket Atlas</text></svg></div>
    <nav>
      <a href="home.html" class="active" data-es="Ligas" data-en="Leagues">Ligas</a>
      <a href="#" data-es="Jugadores" data-en="Players">Jugadores</a>
      <a href="transfers.html" data-es="Traspasos" data-en="Transfers">Traspasos</a>
      <a href="noticias.html" data-es="Noticias" data-en="News">Noticias</a>
      <button id="theme-toggle" class="btn-ghost">Modo claro</button>
      <button id="lang-toggle" class="btn-ghost">EN</button>
    </nav>
  </header>

  <div class="league-hero">
    <div class="watermark">ACB</div>
    <div class="league-tag" data-es="España" data-en="Spain">España</div>
    <h1>Liga Endesa</h1>
    <div class="sub" data-es="Temporada 2025-26 · Jornada 31" data-en="2025-26 season · round 31">Temporada 2025-26 · Jornada 31</div>
    <div class="league-stats">
      <div class="item"><div class="label" data-es="Equipos" data-en="Teams">Equipos</div><div class="value">18</div></div>
      <div class="item"><div class="label" data-es="Jugadores" data-en="Players">Jugadores</div><div class="value">231</div></div>
      <div class="item"><div class="label" data-es="Líder valoración" data-en="Top rating">Líder valoración</div><div class="value">L. Bozic — 24,3</div></div>
    </div>
  </div>

  <div class="content">

    <div class="section-label" data-es="Equipos" data-en="Teams">Equipos</div>
    <div class="team-strip" id="team-strip"></div>

    <div class="stat-tabs" id="stat-tabs"></div>

    <table>
      <thead>
        <tr>
          <th class="rank-col">#</th>
          <th data-es="Jugador" data-en="Player">Jugador</th>
          <th class="num-col" data-es="PJ" data-en="GP">PJ</th>
          <th class="num-col">MIN</th>
          <th class="num-col">PTS</th>
          <th class="num-col">REB</th>
          <th class="num-col">AST</th>
          <th class="num-col" data-es="VAL" data-en="PIR">VAL</th>
        </tr>
      </thead>
      <tbody id="player-tbody"></tbody>
    </table>

  </div>

  <footer>
    <span>© basket atlas</span>
    <span data-es="Datos de ejemplo, no reales" data-en="Sample data, not real">Datos de ejemplo, no reales</span>
  </footer>
</div>

<script>
const TEAMS = ['Todos','Real Madrid','FC Barcelona','Unicaja','Baskonia','Joventut Badalona','Girona','Valencia Basket'];
const TEAM_ALL_LABEL = {es:'Todos', en:'All'};
function teamDisplay(t){ return t === 'Todos' ? TEAM_ALL_LABEL[currentLang] : t; }

const PLAYERS = [
  {num:23, name:'D. Vásquez', team:'FC Barcelona', pj:31, min:'24:40', pts:11.6, reb:2.4, ast:6.7, val:13.8},
  {num:7,  name:'J. Marín',   team:'Real Madrid',   pj:29, min:'22:10', pts:14.2, reb:4.8, ast:3.1, val:16.9},
  {num:0,  name:'T. Lyles',   team:'Real Madrid',   pj:28, min:'26:40', pts:11.7, reb:5.0, ast:1.8, val:14.1},
  {num:11, name:'M. Torres',  team:'Unicaja',        pj:30, min:'25:12', pts:13.0, reb:3.2, ast:2.0, val:12.6},
  {num:5,  name:'N. Ferrer',  team:'Girona',         pj:27, min:'21:35', pts:9.4,  reb:2.1, ast:4.6, val:10.2},
  {num:14, name:'L. Bozic',   team:'Joventut Badalona', pj:32, min:'29:16', pts:16.2, reb:6.6, ast:2.9, val:24.3},
  {num:8,  name:'M. Huertas', team:'Baskonia',       pj:33, min:'24:04', pts:8.1,  reb:1.9, ast:5.5, val:11.4},
  {num:9,  name:'K. Perry',   team:'Unicaja',        pj:26, min:'20:48', pts:12.4, reb:2.6, ast:1.6, val:9.8},
  {num:12, name:'S. Yusta',   team:'Valencia Basket', pj:31, min:'26:43', pts:15.9, reb:3.4, ast:1.9, val:15.5},
  {num:6,  name:'G. Corbalán', team:'Valencia Basket', pj:29, min:'26:04', pts:10.8, reb:2.0, ast:3.9, val:11.0},
];

const STAT_TABS = [
  {key:'val', es:'Valoración', en:'Rating'},
  {key:'pts', es:'Puntos', en:'Points'},
  {key:'reb', es:'Rebotes', en:'Rebounds'},
  {key:'ast', es:'Asistencias', en:'Assists'},
];

let activeTeam = 'Todos';
let activeStat = 'val';
let currentLang = 'es';

function renderTeams(){
  const box = document.getElementById('team-strip');
  box.innerHTML = TEAMS.map(t => `
    <button class="team-chip ${t===activeTeam?'active':''}" data-team="${t}">${teamDisplay(t)}</button>
  `).join('');
  box.querySelectorAll('.team-chip').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      activeTeam = btn.dataset.team;
      renderTeams();
      renderTable();
    });
  });
}

function renderTabs(){
  const box = document.getElementById('stat-tabs');
  box.innerHTML = STAT_TABS.map(s => `
    <button class="stat-tab ${s.key===activeStat?'active':''}" data-stat="${s.key}">${s[currentLang]}</button>
  `).join('');
  box.querySelectorAll('.stat-tab').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      activeStat = btn.dataset.stat;
      renderTabs();
      renderTable();
    });
  });
}

function renderTable(){
  const tbody = document.getElementById('player-tbody');
  let rows = activeTeam === 'Todos' ? [...PLAYERS] : PLAYERS.filter(p => p.team === activeTeam);
  rows.sort((a,b) => b[activeStat] - a[activeStat]);

  if(rows.length === 0){
    const msg = currentLang === 'es' ? 'Sin jugadores para este equipo en los datos de ejemplo.' : 'No players for this team in the sample data.';
    tbody.innerHTML = `<tr><td colspan="8" style="color:var(--muted);padding:24px 8px;">${msg}</td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map((p, i) => `
    <tr onclick="location.href='jugador.html'">
      <td class="rank-col mono">${i+1}</td>
      <td>
        <div class="name-cell">
          <div class="dorsal-mini mono">${p.num}</div>
          <div>
            <div class="player-name">${p.name}</div>
            <div class="team-name">${p.team}</div>
          </div>
        </div>
      </td>
      <td class="num-col mono">${p.pj}</td>
      <td class="num-col mono">${p.min}</td>
      <td class="num-col mono ${activeStat==='pts'?'highlight-col':''}">${p.pts.toFixed(1)}</td>
      <td class="num-col mono ${activeStat==='reb'?'highlight-col':''}">${p.reb.toFixed(1)}</td>
      <td class="num-col mono ${activeStat==='ast'?'highlight-col':''}">${p.ast.toFixed(1)}</td>
      <td class="num-col mono ${activeStat==='val'?'highlight-col':''}">${p.val.toFixed(1)}</td>
    </tr>
  `).join('');
}

renderTeams();
renderTabs();
renderTable();

const themeToggle = document.getElementById('theme-toggle');
const langToggle = document.getElementById('lang-toggle');
const THEME_LABEL = { es: ['Modo claro', 'Modo oscuro'], en: ['Light mode', 'Dark mode'] };

function applyTheme(light){
  document.documentElement.classList.toggle('light', light);
  themeToggle.textContent = THEME_LABEL[currentLang][light ? 1 : 0];
  try { localStorage.setItem('basketatlas-theme', light ? 'light' : 'dark'); } catch(e) {}
}
function isLight(){ return document.documentElement.classList.contains('light'); }

function applyLang(lang){
  currentLang = lang;
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-es]').forEach(el => { el.textContent = el.dataset[lang]; });
  langToggle.textContent = lang === 'es' ? 'EN' : 'ES';
  themeToggle.textContent = THEME_LABEL[currentLang][isLight() ? 1 : 0];
  renderTeams();
  renderTabs();
  renderTable();
  try { localStorage.setItem('basketatlas-lang', lang); } catch(e) {}
}

let savedTheme = null, savedLang = null;
try { savedTheme = localStorage.getItem('basketatlas-theme'); } catch(e) {}
try { savedLang = localStorage.getItem('basketatlas-lang'); } catch(e) {}
applyLang(savedLang === 'en' ? 'en' : 'es');
applyTheme(savedTheme === 'light');

themeToggle.addEventListener('click', () => applyTheme(!isLight()));
langToggle.addEventListener('click', () => applyLang(currentLang === 'es' ? 'en' : 'es'));
</script>
</body>
</html>
